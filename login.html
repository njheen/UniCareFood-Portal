
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniFoodCare - Login & Register</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background: #f4f7f9;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        flex-direction: column;
    }

    .brand-header {
        text-align: center;
        margin-bottom: 20px;
        color: #2e7d32;
    }

    .brand-header i {
        font-size: 40px;
        margin-bottom: 10px;
    }

    .auth-container {
        background: white;
        width: 100%;
        max-width: 450px;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    /* Tabs */
    .tabs {
        display: flex;
        margin-bottom: 25px;
        border-bottom: 2px solid #e0e0e0;
    }

    .tab {
        flex: 1;
        text-align: center;
        padding: 10px;
        font-size: 18px;
        font-weight: bold;
        color: #555;
        cursor: pointer;
        transition: 0.3s;
    }

    .tab.active {
        color: #2e7d32;
        border-bottom: 3px solid #2e7d32;
    }

    /* Form Styles */
    .form-group {
        margin-bottom: 18px;
    }

    .form-group label {
        display: block;
        font-size: 14px;
        color: #333;
        margin-bottom: 8px;
        font-weight: bold;
    }

    .form-group input, .form-group select {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 15px;
        outline: none;
        transition: 0.3s;
    }

    .form-group input:focus, .form-group select:focus {
        border-color: #2e7d32;
        box-shadow: 0 0 5px rgba(46, 125, 50, 0.2);
    }

    .submit-btn {
        width: 100%;
        padding: 14px;
        background: #2e7d32;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
    }

    .submit-btn:hover {
        background: #1b5e20;
    }

    /* Hide sections by default */
    .form-section {
        display: none;
    }

    .form-section.active {
        display: block;
    }

    /* Small text links */
    .form-footer {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
        color: #555;
    }

    .form-footer a {
        color: #2e7d32;
        text-decoration: none;
        font-weight: bold;
    }

    .form-footer a:hover {
        text-decoration: underline;
    }
</style>
</head>
<body>

    <div class="brand-header">
        <i class="fa-solid fa-seedling"></i>
        <h2>UniFoodCare Portal</h2>
    </div>

    <div class="auth-container">
        
        <div class="tabs">
            <div class="tab active" id="tab-login" onclick="switchTab('login')">Login</div>
            <div class="tab" id="tab-register" onclick="switchTab('register')">Register</div>
        </div>

        <div id="login-form" class="form-section active">
            <div class="form-group">
                <label>I am a:</label>
                <select id="login-user-type" onchange="updateLoginFields()">
                    <option value="student">Student</option>
                    <option value="donor">Donor</option>
                    <option value="hep">HEP Officer</option>
                </select>
            </div>

            <div class="form-group">
                <label id="login-identifier-label">Student Number</label>
                <input type="text" id="login-identifier" placeholder="Enter your Student Number" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Enter your password" required>
            </div>

            <button class="submit-btn" onclick="window.location.href='dashboard.html'">Login</button>
            
            <div class="form-footer">
                <a href="#" onclick="switchTab('register')">No account? Register here</a>
            </div>
        </div>

        <div id="register-form" class="form-section">
            <div class="form-group">
                <label>Register as a:</label>
                <select id="register-user-type" onchange="updateRegisterFields()">
                    <option value="student">Student</option>
                    <option value="donor">Donor</option>
                </select>
            </div>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your full name" required>
            </div>

            <div class="form-group" id="reg-student-num-group">
                <label>Student Number</label>
                <input type="text" placeholder="Enter your student number" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" placeholder="Enter your phone number" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Create a password" required>
            </div>

            <button class="submit-btn">Create Account</button>
        </div>

    </div>

    <script>
        function switchTab(tab) {
            // Update tabs
            document.getElementById('tab-login').classList.remove('active');
            document.getElementById('tab-register').classList.remove('active');
            document.getElementById('tab-' + tab).classList.add('active');

            // Update forms
            document.getElementById('login-form').classList.remove('active');
            document.getElementById('register-form').classList.remove('active');
            document.getElementById(tab + '-form').classList.add('active');
        }

        function updateLoginFields() {
            const userType = document.getElementById('login-user-type').value;
            const label = document.getElementById('login-identifier-label');
            const input = document.getElementById('login-identifier');

            if (userType === 'student') {
                label.innerText = 'Student Number';
                input.placeholder = 'Enter your Student Number';
                input.type = 'text';
            } else if (userType === 'donor') {
                label.innerText = 'Email Address';
                input.placeholder = 'Enter your Email';
                input.type = 'email';
            } else if (userType === 'hep') {
                label.innerText = 'Staff ID';
                input.placeholder = 'Enter your Staff ID';
                input.type = 'text';
            }
        }

        function updateRegisterFields() {
            const userType = document.getElementById('register-user-type').value;
            const studentNumGroup = document.getElementById('reg-student-num-group');

            if (userType === 'student') {
                studentNumGroup.style.display = 'block';
            } else if (userType === 'donor') {
                studentNumGroup.style.display = 'none';
            }
        }
    </script>

</body>
</html>
